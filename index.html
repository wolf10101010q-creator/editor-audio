<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Audio Editor</title>

<style>
body{
	margin:0;
	background:#111;
	font-family:Arial;
	color:white;
	overflow:hidden;
}

/* TELA */
#inicio, #editor{
	position:absolute;
	width:100%;
	height:100vh;
	display:none;
}

#inicio{
	display:flex;
	justify-content:center;
	align-items:center;
	flex-direction:column;
	background:#1c1c1c;
}

/* TOPO */
#topbar{
	height:60px;
	background:#1a1a1a;
	display:flex;
	align-items:center;
	padding:0 15px;
}

/* AREA GRAVAÇÃO */
#gravacaoBox{
	position:absolute;
	top:70px;
	left:50%;
	transform:translateX(-50%);
	width:80%;
	height:60px;
	background:black;
	border-radius:8px;
	display:flex;
	align-items:center;
}

#linhaGravando{
	width:4px;
	height:80%;
	background:red;
	margin-left:5px;
	display:none;
}

/* TIMELINE */
#timelineContainer{
	position:absolute;
	top:150px;
	bottom:90px;
	left:0;
	right:0;
	overflow-x:auto;
	background:#181818;
}

#timeline{
	position:relative;
	height:100%;
	width:4000px;
}

.bloco{
	position:absolute;
	height:70px;
	background:#00c3ff;
	border-radius:8px;
	top:50%;
	transform:translateY(-50%);
	display:flex;
	align-items:center;
	justify-content:center;
	font-size:12px;
	color:black;
	padding:5px;
}

/* BARRA INFERIOR */
#bottombar{
	position:absolute;
	bottom:0;
	left:0;
	right:0;
	height:90px;
	background:#1a1a1a;
	display:flex;
	justify-content:space-around;
	align-items:center;
}

button{
	padding:12px 18px;
	border:none;
	border-radius:8px;
	font-size:16px;
}

.rec{ background:red; color:white; }
.play{ background:#00ff95; }
</style>
</head>

<body>

<div id="inicio">
	<h2>🎵 Editor de Áudio</h2>
	<button onclick="abrirEditor()">Criar Música</button>
</div>

<div id="editor">

	<div id="topbar">
		<button onclick="voltar()">⬅</button>
		<span style="margin-left:15px;">Projeto</span>
	</div>

	<div id="gravacaoBox">
		<div id="linhaGravando"></div>
	</div>

	<div id="timelineContainer">
		<div id="timeline"></div>
	</div>

	<div id="bottombar">
		<button id="recBtn" class="rec" onclick="toggleRec()">GRAVAR</button>
		<button class="play" onclick="playAll()">▶ Play</button>
	</div>

</div>

<script>
let gravando=false;
let mediaRecorder;
let chunks=[];
let blocos=[];
let blocoAtual=null;
let inicioTempo;
let contador=1;

document.getElementById("inicio").style.display="flex";

function abrirEditor(){
	document.getElementById("inicio").style.display="none";
	document.getElementById("editor").style.display="block";
}

function voltar(){
	document.getElementById("editor").style.display="none";
	document.getElementById("inicio").style.display="flex";
}

async function toggleRec(){

	if(!gravando){

		try{
			const stream=await navigator.mediaDevices.getUserMedia({audio:true});
			mediaRecorder=new MediaRecorder(stream);

			mediaRecorder.ondataavailable=e=>{
				if(e.data.size>0) chunks.push(e.data);
			};

			mediaRecorder.onstop=()=>{
				if(chunks.length===0){
					alert("Nada foi gravado.");
					return;
				}

				let blob=new Blob(chunks,{type:"audio/webm"});
				chunks=[];
				blocoAtual.audioURL=URL.createObjectURL(blob);
				blocos.push(blocoAtual);
				blocoAtual=null;
			};

			mediaRecorder.start();
			gravando=true;
			document.getElementById("recBtn").innerText="PARAR";
			document.getElementById("linhaGravando").style.display="block";

			inicioTempo=Date.now();
			criarBloco();

		}catch(err){
			alert("Permissão de microfone negada ou navegador bloqueou.");
			console.log(err);
		}

	}else{

		mediaRecorder.stop();
		gravando=false;
		document.getElementById("recBtn").innerText="GRAVAR";
		document.getElementById("linhaGravando").style.display="none";
	}
}

function criarBloco(){
	let timeline=document.getElementById("timeline");

	let div=document.createElement("div");
	div.className="bloco";
	div.style.left="50px";
	div.style.width="10px";
	div.innerText="Som "+contador++;

	timeline.appendChild(div);

	blocoAtual={
		element:div,
		audioURL:null
	};

	animar();
}

function animar(){
	if(!gravando) return;

	let largura=(Date.now()-inicioTempo)/8;
	blocoAtual.element.style.width=largura+"px";

	requestAnimationFrame(animar);
}

function playAll(){

	if(blocos.length===0){
		alert("Nenhum áudio gravado.");
		return;
	}

	let delay=0;

	blocos.forEach(b=>{
		setTimeout(()=>{
			let audio=new Audio(b.audioURL);
			audio.play();
		},delay);
		delay+=1500;
	});
}
</script>

</body>
  </html>
