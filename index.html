<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor CapCut Áudio</title>

<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif;}

body{
  background:#0d0d0d;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOPO */
#topbar{
  height:50px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  border-bottom:1px solid #222;
}

/* EDITOR TIMELINE */
#editor{
  flex:1;
  position:relative;
  background:#161616;
  overflow:hidden;
}

/* SCROLL HORIZONTAL */
#timeline{
  position:absolute;
  top:30px;
  left:0;
  height:100%;
  width:2000px;
  display:flex;
  align-items:center;
  padding:0 50px;
  gap:10px;
  overflow-x:auto;
}

/* CLIPS */
.clip{
  height:70px;
  background:linear-gradient(45deg,#ff0055,#ff3366);
  border-radius:12px;
  min-width:100px;
  position:relative;
}

/* PLAYHEAD */
#playhead{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:3px;
  height:100%;
  background:red;
  z-index:10;
}

/* BARRA INFERIOR */
#bottombar{
  height:90px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #222;
}

.control-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  color:white;
}

.control-btn.play{
  background:#ff0033;
}

.control-btn:active{
  transform:scale(0.9);
}

/* RÉGUA */
#ruler{
  position:absolute;
  top:0;
  left:0;
  width:2000px;
  height:30px;
  background:#1c1c1c;
  border-bottom:1px solid #333;
}
</style>
</head>
<body>

<div id="topbar">Editor de Áudio</div>

<div id="editor">
  <div id="playhead"></div>
  <div id="ruler"></div>
  <div id="timeline"></div>
</div>

<div id="bottombar">
  <div id="recBtn" class="control-btn">REC</div>
  <div id="playBtn" class="control-btn play">▶</div>
  <div class="control-btn">✂</div>
  <div class="control-btn">🎵</div>
  <div class="control-btn">⚙</div>
</div>

<script>
let mediaRecorder;
let chunks=[];
let recordings=[];
let isRecording=false;

const recBtn=document.getElementById("recBtn");
const playBtn=document.getElementById("playBtn");
const timeline=document.getElementById("timeline");

/* GRAVAÇÃO */
recBtn.onclick=async function(){
  if(!isRecording){
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);

    mediaRecorder.ondataavailable=e=>chunks.push(e.data);

    mediaRecorder.onstop=()=>{
      const blob=new Blob(chunks,{type:'audio/webm'});
      chunks=[];
      recordings.push(blob);
      createBlock(blob);
    };

    mediaRecorder.start();
    recBtn.innerText="■";
    recBtn.style.background="#aa0000";
    isRecording=true;
  }else{
    mediaRecorder.stop();
    recBtn.innerText="REC";
    recBtn.style.background="#ff0033";
    isRecording=false;
  }
};

/* CRIAR BLOCO */
function createBlock(blob){
  const block=document.createElement("div");
  block.className="clip";

  const audio=new Audio(URL.createObjectURL(blob));
  block.onclick=function(){audio.play();};

  timeline.appendChild(block);
}

/* PLAY TODOS */
playBtn.onclick=function(){
  recordings.forEach(blob=>{
    const audio=new Audio(URL.createObjectURL(blob));
    audio.play();
  });
};
</script>

</body>
</html>
