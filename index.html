<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Áudio</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#timeline{
  flex:1;
  overflow-x:auto;
  display:flex;
  align-items:center;
  padding:20px;
  background:#1a1a1a;
}

.block{
  height:60px;
  min-width:100px;
  background:red;
  margin-right:10px;
  border-radius:8px;
}

#controls{
  height:90px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

button{
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:16px;
}

#recBtn{background:red;color:white;}
#playBtn{background:#444;color:white;}
#listBtn{background:#666;color:white;}

#recordList, #lyricsScreen{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  overflow:auto;
  padding:20px;
}
</style>
</head>

<body>

<div id="timeline"></div>

<div id="controls">
  <button id="recBtn">REC</button>
  <button id="playBtn">▶</button>
  <button id="listBtn">≡</button>
</div>

<div id="recordList">
  <h2>Lista de Gravações</h2>
  <div id="listContainer"></div>
  <button onclick="closeList()">Fechar</button>
</div>

<div id="lyricsScreen">
  <button onclick="closeLyrics()">Voltar</button>
  <h2>Letra da Música</h2>
  <div style="height:300px; overflow-y:auto;">
    <p>Aqui você poderá colocar a letra da música...</p>
    <p>Ela pode rolar para cima e para baixo.</p>
  </div>
</div>

<script>
let mediaRecorder;
let chunks = [];
let recordings = [];
let isRecording = false;

const recBtn = document.getElementById("recBtn");
const timeline = document.getElementById("timeline");

recBtn.onclick = async function(){
  if(!isRecording){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks,{type:'audio/webm'});
      chunks = [];
      const url = URL.createObjectURL(blob);
      recordings.push(url);
      addBlock();
    };

    mediaRecorder.start();
    recBtn.innerText = "■";
    recBtn.style.background = "#900";
    isRecording = true;
  }else{
    mediaRecorder.stop();
    recBtn.innerText = "REC";
    recBtn.style.background = "red";
    isRecording = false;
  }
};

function addBlock(){
  const block = document.createElement("div");
  block.className = "block";
  timeline.appendChild(block);
}

document.getElementById("listBtn").onclick = function(){
  document.getElementById("recordList").style.display = "block";
  updateList();
};

function closeList(){
  document.getElementById("recordList").style.display = "none";
}

function updateList(){
  let container = document.getElementById("listContainer");
  container.innerHTML = "";
  recordings.forEach((rec,index)=>{
    let btn = document.createElement("button");
    btn.innerText = "Gravação "+(index+1);
    btn.onclick = function(){
      addBlock();
    };
    container.appendChild(btn);
  });
}

document.getElementById("playBtn").onclick = function(){
  document.getElementById("lyricsScreen").style.display = "block";
};

function closeLyrics(){
  document.getElementById("lyricsScreen").style.display = "none";
}
</script>

</body>
</html>
