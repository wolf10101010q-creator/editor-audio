<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Música</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* TIMELINE */
#timeline{
  flex:1;
  background:#1c1c1c;
  overflow-x:auto;
  display:flex;
  align-items:center;
  padding:20px;
  gap:10px;
}

.block{
  height:70px;
  background:linear-gradient(45deg,#ff004c,#ff3366);
  border-radius:10px;
  min-width:100px;
  position:relative;
}

/* BARRA FIXA */
#controls{
  height:90px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #222;
}

button{
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:18px;
  color:white;
}

#recBtn{background:#ff0033;}
#playBtn{background:#333;}
#lyricsBtn{background:#555;}

/* MODAL LETRA */
#lyricsModal{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:110px;
  width:90%;
  max-width:500px;
  height:300px;
  background:#181818;
  border-radius:15px;
  padding:15px;
  display:none;
  flex-direction:column;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
}

#lyricsContent{
  flex:1;
  overflow-y:auto;
  background:#101010;
  padding:10px;
  border-radius:10px;
}

#closeLyrics{
  margin-top:10px;
  background:#333;
  height:40px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="timeline"></div>

<div id="controls">
  <button id="recBtn">REC</button>
  <button id="playBtn">▶</button>
  <button id="lyricsBtn">TXT</button>
</div>

<div id="lyricsModal">
  <div id="lyricsContent" contenteditable="true">
    Escreva a letra da música aqui...
  </div>
  <button id="closeLyrics">Fechar</button>
</div>

<script>
let mediaRecorder;
let chunks=[];
let recordings=[];
let isRecording=false;

const recBtn=document.getElementById("recBtn");
const playBtn=document.getElementById("playBtn");
const timeline=document.getElementById("timeline");

/* GRAVAÇÃO */
recBtn.onclick=async function(){
  if(!isRecording){
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);

    mediaRecorder.ondataavailable=e=>chunks.push(e.data);

    mediaRecorder.onstop=()=>{
      const blob=new Blob(chunks,{type:'audio/webm'});
      chunks=[];
      recordings.push(blob);
      createBlock(blob);
    };

    mediaRecorder.start();
    recBtn.innerText="■";
    recBtn.style.background="#aa0000";
    isRecording=true;
  }else{
    mediaRecorder.stop();
    recBtn.innerText="REC";
    recBtn.style.background="#ff0033";
    isRecording=false;
  }
};

/* CRIAR BLOCO */
function createBlock(blob){
  const block=document.createElement("div");
  block.className="block";

  const audio=new Audio(URL.createObjectURL(blob));

  block.onclick=function(){
    audio.play();
  };

  timeline.appendChild(block);
}

/* PLAY TODOS */
playBtn.onclick=function(){
  recordings.forEach(blob=>{
    const audio=new Audio(URL.createObjectURL(blob));
    audio.play();
  });
};

/* LETRA */
const lyricsBtn=document.getElementById("lyricsBtn");
const lyricsModal=document.getElementById("lyricsModal");
const closeLyrics=document.getElementById("closeLyrics");

lyricsBtn.onclick=function(){
  lyricsModal.style.display="flex";
};

closeLyrics.onclick=function(){
  lyricsModal.style.display="none";
};
</script>

</body>
</html>
